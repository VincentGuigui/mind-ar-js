<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>A-Frame Frame-Only Mode Example</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="../dist-dev/mindar-image-aframe.js"></script>
</head>
<body>
    <a-scene mindar-image="imageTargetSrc: targets/target_frame_only_border.mind; simThreshold: 0.2;
    maxTrack: 1;
    autoStart: true"
             vr-mode-ui="enabled: false"
             device-orientation-permission-ui="enabled: false">
        <a-assets>
        </a-assets>

        <a-camera position="0 0 0"
                  look-controls="enabled: false"
                  cursor="fuse: false; rayOrigin: mouse;"
                  raycaster="far: 10000; objects: .clickable">
        </a-camera>

        <a-entity id="mytarget" mindar-image-target="targetIndex: 0;">
            <a-plane></a-plane>
            <a-text value="DETECTED"
                    position="0 0 0"
                    align="center"
                    color="green"
                    scale="0.5 0.5 0.5">
            </a-text>
        </a-entity>
    </a-scene>

    <div style="position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 10px; border-radius: 5px; font-family: Arial;">
    </div>
</body>
</html>
